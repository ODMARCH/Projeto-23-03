    <table border="1"> <!--colocar uma borda, vai ficar vermelho msm-->

<section>
    <h2>Formularios</h2>
    <form method="post" action="">
        <fieldset>
            <legend>Dados Pessoais</legend>
            <label for="nome">Nome</label>
            <input required placeholder="Escreva aqui seu nome completo" name="nome-completo" id="nome" type="text">
            <br>
            <label for="">Email</label>
            <input name="email-pessoal" type="email" value="@unifebe.edu.br">
        </fieldset>

        <fieldset>
            <legend>Seleção de Listas</legend>
            <label for="estado">Selecione seu Estado</label>
            <select name="estado-selecionado" id="estado">
                <option value="SC">Santa Catarina</option>
                <option value="PR">Paraná</option>
            </select>
        </fieldset>

        <fieldset>
            <legend>Qual o melhor periodo de estudo?</legend>
            <input type="radio" id="manha" name="periodo-estudo">
            <label for="manha">Manha</label>

            <input type="radio" id="Tarde" name="periodo-estudo">
            <label for="noite">Tarde</label>

            <input type="radio" id="Noite" name="periodo-estudo">
            <label for="noite">Noite</label>
        </fieldset>

        <fieldset>
            <legend>Lista de compras</legend>
            <input type="checkbox" id="cafe" name="cafe">
            <label for="cafe">Café</label>
            <br>
            <input type="checkbox" id="acucar" name="acucar">
            <label for="acucar">Acucar</label>
            <br> <!--a tag BR significa Quebra de linha-->
            <input type="checkbox" id="leite" name="leite">
            <label for="leite">Leite</label>
        </fieldset>

        <fieldset>
            <legend>Comentarios</legend>
            <textarea name="comentario" cols="30" rows="10"></textarea>
        </fieldset>

        <br>
        <button type="submit">Enviar</button>
        <input type="reset">
</section>
